name: Build Chinese Chess APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/chinese-chess/**'
      - '.github/workflows/chinese-chess-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chinese-chess
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chinese-chess-debug-apk
          path: apps/chinese-chess/android/app/build/outputs/apk/debug/*.apk
